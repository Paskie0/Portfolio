<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="./output.css" />
    <link href="http://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/d437031e9c.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@2.18.1/dist/full.css" rel="stylesheet" type="text/css" />
    <html data-theme="night"></html>
  </head>
  <body class="h-[300vh]">
    <div class="navbar bg-base-300">
      <div class="navbar-start">
        <div class="dropdown">
          <label tabindex="0" class="btn btn-ghost btn-square">
            <i class="fa-solid fa-bars fa-2xl"></i>
          </label>
          <ul tabindex="0" class="menu menu-compact dropdown-content mt-2 p-2 shadow bg-base-300 rounded-box w-52">
            <li><a>Homepage</a></li>
            <li><a>Portfolio</a></li>
            <li><a>About</a></li>
          </ul>
        </div>
      </div>
      <div class="navbar-center">
        <a class="normal-case font-bold text-2xl">Paskie.dev</a>
      </div>
      <div class="navbar-end">
        <button class="btn btn-ghost btn-square">
          <i class="fa-brands fa-github-square fa-2xl"></i>
        </button>
        <button class="btn btn-ghost btn-square">
          <div>
            <i class="fa-brands fa-linkedin fa-2xl"></i>
          </div>
        </button>
      </div>
    </div>
    <div class="card w-96 bg-base-200 shadow-xl">
      <div class="card-body">
        <h2 class="card-title">Card title!</h2>
        <p>If a dog chews shoes whose shoes does he choose?</p>
        <div class="card-actions justify-end">
          <button class="btn btn-primary">Buy Now</button>
          <button class="btn rounded-none px-16">Two</button>
        </div>
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
